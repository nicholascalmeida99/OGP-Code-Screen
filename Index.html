<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGP Admin - Enviar Pedido</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0071dc; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: white; color: #333; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 90%; max-width: 400px; text-align: center; }
        h2 { color: #0071dc; margin-bottom: 20px; }
        label { display: block; text-align: left; margin: 10px 0 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #ffc220; border: none; color: #333; font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #e6af1c; }
        #status { margin-top: 15px; font-weight: bold; color: green; }
    </style>
</head>
<body>

<div class="container">
    <h2>OGP - Novo Pedido</h2>
    <form id="orderForm">
        <label for="bay">Vaga (BAY):</label>
        <input type="number" id="bay" placeholder="Ex: 12" required>

        <label for="code">Código do Pedido:</label>
        <input type="text" id="code" placeholder="Ex: 4578" required>

        <button type="submit">Adicionar à TV</button>
    </form>
    <div id="status"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ⚠️ COLOQUE AS SUAS CHAVES DO FIREBASE AQUI
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "SEU_AUTH_DOMAIN",
        projectId: "walmart-ogp-code-screen",
        storageBucket: "SEU_STORAGE_BUCKET",
        messagingSenderId: "SEU_MESSAGING_SENDER_ID",
        appId: "SEU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('orderForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const bayInput = document.getElementById('bay').value;
        const codeInput = document.getElementById('code').value;
        const statusDiv = document.getElementById('status');

        try {
            statusDiv.style.color = "orange";
            statusDiv.innerText = "Enviando...";

            await addDoc(collection(db, "orders"), {
                bay: bayInput,
                code: codeInput,
                timestamp: serverTimestamp()
            });

            statusDiv.style.color = "green";
            statusDiv.innerText = "Pedido enviado com sucesso!";
            document.getElementById('orderForm').reset();
            setTimeout(() => { statusDiv.innerText = ""; }, 3000);
        } catch (error) {
            console.error(error);
            statusDiv.style.color = "red";
            statusDiv.innerText = "Erro ao enviar.";
        }
    });
</script>
</body>
</html>
