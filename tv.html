<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel OGP - Chamadas</title>
    <style>
        body { font-family: 'Arial Black', sans-serif; background-color: #1a1a1a; color: white; margin: 0; padding: 20px; box-sizing: border-box; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #0071dc; padding-bottom: 10px; margin-bottom: 20px; }
        header h1 { margin: 0; color: #0071dc; font-size: 2.5rem; text-transform: uppercase; }
        .logo-walmart { color: #ffc220; }
        .grid-pedidos { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .card-pedido { background-color: #333; border-left: 15px solid #ffc220; padding: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .bay-num { font-size: 2.5rem; color: #fff; }
        .code-num { font-size: 2.5rem; color: #ffc220; }
        .btn-limpar { background: #ff4d4d; color: white; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; font-family: Arial, sans-serif; }
    </style>
</head>
<body>

<header>
    <h1>Walmart <span class="logo-walmart">OGP</span> Pick-Up</h1>
    <button class="btn-limpar" id="clearBtn">Limpar Painel</button>
</header>

<div class="grid-pedidos" id="painelPedidos"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ⚠️ COLOQUE AS SUAS CHAVES DO FIREBASE AQUI (Igual ao index.html)
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "SEU_AUTH_DOMAIN",
        projectId: "walmart-ogp-code-screen",
        storageBucket: "SEU_STORAGE_BUCKET",
        messagingSenderId: "SEU_MESSAGING_SENDER_ID",
        appId: "SEU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const painelPedidos = document.getElementById('painelPedidos');

    const q = query(collection(db, "orders"), orderBy("timestamp", "desc"));
    
    onSnapshot(q, (snapshot) => {
        painelPedidos.innerHTML = "";
        if (snapshot.empty) {
            painelPedidos.innerHTML = "<h2 style='color:#666; width:100%; text-align:center;'>Nenhum carro na vaga.</h2>";
            return;
        }
        snapshot.forEach((doc) => {
            const data = doc.data();
            const card = document.createElement('div');
            card.className = 'card-pedido';
            card.innerHTML = `<div class="bay-num">BAY ${data.bay}</div><div class="code-num">#${data.code}</div>`;
            painelPedidos.appendChild(card);
        });
    });

    document.getElementById('clearBtn').addEventListener('click', async () => {
        if(confirm("Deseja limpar o painel?")) {
            const querySnapshot = await getDocs(collection(db, "orders"));
            querySnapshot.forEach((documento) => { deleteDoc(doc(db, "orders", documento.id)); });
        }
    });
</script>
</body>
</html>
